<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Random Image Gallery & Offline Chat</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        #gallery { display: flex; flex-wrap: wrap; }\n        .image { margin: 5px; }\n        .image img { width: 100px; height: auto; }\n        #chat { margin-top: 20px; }\n        #chatMessages { border: 1px solid #ccc; height: 200px; overflow-y: scroll; margin-bottom: 10px; }\n    </style>\n</head>\n<body>\n    <h1>Random Image Gallery</h1>\n    <div id="gallery"></div>\n    <h2>Offline Chat</h2>\n    <div id="chat">\n        <div id="chatMessages"></div>\n        <input type="text" id="chatInput" placeholder="Type a message...">\n        <button id="sendButton">Send</button>\n    </div>\n    <script>\n        // Random Image Gallery\n        const images = JSON.parse(localStorage.getItem('images')) || [];\n        function displayRandomImages() {\n            const gallery = document.getElementById('gallery');\n            gallery.innerHTML = '';\n            const randomImage = images[Math.floor(Math.random() * images.length)];\n            if (randomImage) {\n                const imgDiv = document.createElement('div');\n                imgDiv.className = 'image';\n                const img = document.createElement('img');\n                img.src = randomImage;\n                imgDiv.appendChild(img);\n                gallery.appendChild(imgDiv);\n            }\n        }\n        displayRandomImages();\n\n        // Offline Chat\n        const chatMessages = document.getElementById('chatMessages');\n        const chatInput = document.getElementById('chatInput');\n        const sendButton = document.getElementById('sendButton');\n        let messages = JSON.parse(localStorage.getItem('chatMessages')) || [];\n\n        function updateChat() {\n            chatMessages.innerHTML = messages.map(msg => '<div>' + msg + '</div>').join('');\n        }\n        updateChat();\n\n        sendButton.addEventListener('click', () => {\n            const message = chatInput.value;\n            if (message) {\n                messages.push(message);\n                localStorage.setItem('chatMessages', JSON.stringify(messages));\n                updateChat();\n                chatInput.value = '';\n            }\n        });\n    </script>\n</body>\n</html>
